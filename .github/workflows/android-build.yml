name: Android Build

on:
  push:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'android/**'
      - '.github/workflows/android-build.yml'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Build release APK (unsigned)
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: poke-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: poke-release-apk
          path: android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

  release:
    name: Create Release with APK
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x android/gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties', 'android/**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Get version info
        id: version
        run: |
          VERSION_CODE=$(grep "versionCode" android/app/build.gradle.kts | grep -oP '\d+')
          VERSION_NAME=$(grep "versionName" android/app/build.gradle.kts | grep -oP '"\K[^"]+')
          echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
          echo "version_name=${VERSION_NAME}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION_NAME}-${VERSION_CODE}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Poke Android v${{ steps.version.outputs.version_name }}"
          body: |
            ## Poke - Pokémon Battle Simulator for Android

            ### Download
            Download the APK below and install it on your Android device.

            > **Note:** You may need to enable "Install from unknown sources" in your Android settings.

            ### Features
            - 📖 **Pokédex** — Browse Pokémon with search and type filter
            - ⚔️ **Moves** — Explore all moves with type and category filters
            - ✨ **Abilities** — Search and browse Pokémon abilities
            - 🌿 **Natures** — View all 25 natures and their stat effects
            - 🔢 **Type Effectiveness** — Calculate type matchups
            - 👥 **Team Builder** — Build your team of 6 Pokémon
            - ⚡ **Battle Simulator** — Simulate battles with damage calculation
          files: |
            android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
